# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage-smoke
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: storage-smoke
  dependsOn:
    # The test exposes its persisted identifier through a pod and Service.
    - name: cilium
      namespace: kube-system
  interval: 1h
  path: ./kubernetes/apps/test/storage-smoke/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: test
  timeout: 5m
  # A failed PVC bind, mount, pod, or Service should fail this smoke test.
  wait: true
