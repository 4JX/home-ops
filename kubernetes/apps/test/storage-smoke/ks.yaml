# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage-smoke
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: storage-smoke
  dependsOn:
    # The PVC must wait for the Flux-managed provisioner.
    - name: local-path-provisioner
      namespace: kube-system
  interval: 1h
  path: ./kubernetes/apps/test/storage-smoke/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: test
  timeout: 5m
  wait: true
