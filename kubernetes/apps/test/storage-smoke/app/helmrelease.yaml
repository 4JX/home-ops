# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: storage-smoke
spec:
  chartRef:
    kind: OCIRepository
    name: storage-smoke
  interval: 30m
  values:
    controllers:
      storage-smoke:
        # The PVC is ReadWriteOnce and the workload is disposable.
        strategy: Recreate
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.38.0@sha256:7e2c04dd50ede647bf4a7a4c8dbd629dd4971cd139b9b88fb22bfc3c7a6c13df
            command:
              - /bin/sh
              - -c
            args:
              # Persist the ID on the PVC so pod replacement is observable.
              - |-
                set -eu
                mkdir -p /data/www
                if [ ! -s /data/id ]; then
                  cat /proc/sys/kernel/random/uuid > /data/id
                fi
                cp /data/id /data/www/id
                {
                  echo "persistent-id=$(cat /data/id)"
                  echo "pod=$(hostname)"
                  echo "started-at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                } > /data/www/index.html
                exec httpd -f -p 8080 -h /data/www
            probes:
              # The generated /id endpoint is valid only after the PVC is mounted.
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /id
                    port: 8080
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /id
                    port: 8080
            resources:
              requests:
                cpu: 5m
                memory: 8Mi
              limits:
                memory: 32Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      data:
        # This is node-local test storage, not replicated storage.
        # https://kubernetes.io/docs/concepts/storage/persistent-volumes/
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 128Mi
        storageClass: local-path
        globalMounts:
          - path: /data
    service:
      app:
        ports:
          http:
            port: 8080
