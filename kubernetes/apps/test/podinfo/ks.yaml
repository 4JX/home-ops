# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: podinfo
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: podinfo
  dependsOn:
    # The generated HTTPRoute attaches to this already-programmed Gateway.
    - name: envoy-gateway-gateway
      namespace: network
  interval: 1h
  path: ./kubernetes/apps/test/podinfo/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: test
  timeout: 5m
  wait: true
