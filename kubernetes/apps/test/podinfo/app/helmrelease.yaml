# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
spec:
  # app-template values: https://bjw-s-labs.github.io/helm-charts/docs/app-template/reference/
  chartRef:
    kind: OCIRepository
    name: podinfo
  interval: 30m
  values:
    controllers:
      podinfo:
        containers:
          app:
            image:
              repository: ghcr.io/stefanprodan/podinfo
              tag: 6.14.0@sha256:0a8aa037137c010a75aed8d3fe56931d0edd3bcd0e55acfb96db11e1e96397b1
            # Set the image's CMD explicitly so the listener is predictable.
            command:
              - ./podinfo
            args:
              # Podinfo listens on 9898, which is also the Service port below.
              - --port=9898
    route:
      app:
        parentRefs:
          # Attach to the shared Gateway in the network namespace.
          # https://gateway-api.sigs.k8s.io/api-types/httproute/
          - name: envoy
            namespace: network
            sectionName: http
    service:
      app:
        ports:
          http:
            # app-template routes this named Service port from the HTTPRoute.
            port: 9898
