# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  # Resolve the controller chart from the pinned OCIRepository below.
  # Chart values: https://gateway.envoyproxy.io/docs/install/gateway-helm-api/
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
  install:
    # The controller chart manages its Gateway API CRDs.
    crds: CreateReplace
  interval: 30m
  upgrade:
    # Update CRDs when the pinned controller chart changes.
    crds: CreateReplace
  values:
    config:
      envoyGateway:
        extensionApis:
          # Enable Backend resources for BackendTrafficPolicy and
          # ClientTrafficPolicy CRDs.
          enableBackend: true
        provider:
          type: Kubernetes
          kubernetes:
            deploy:
              # Place proxy pods in the same namespace as the Gateway.
              type: GatewayNamespace
