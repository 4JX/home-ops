# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  # Resolve the controller chart from the pinned OCIRepository below.
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
  install:
    # Gateway API and Envoy Gateway CRDs must precede controller resources.
    crds: CreateReplace
  # Periodically correct drift even when Git is unchanged.
  interval: 30m
  upgrade:
    # Allow a deliberate chart bump to update those CRD definitions.
    crds: CreateReplace
