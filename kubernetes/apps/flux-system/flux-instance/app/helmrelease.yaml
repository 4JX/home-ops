# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-instance
spec:
  chartRef:
    kind: OCIRepository
    name: flux-instance
  interval: 30m
  # Bootstrap reads these values before Flux is running.
  values:
    instance:
      distribution:
        # The operator manifest bundle supplies the Flux controller release.
        # Flux Instance chart docs: https://fluxoperator.dev/docs/charts/flux-instance/
        artifact: oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests:v0.55.0
        version: 2.x
      cluster:
        # No cluster policies exist yet for the bootstrap controllers.
        networkPolicy: false
      components:
        - source-controller
        - kustomize-controller
        - helm-controller
        - notification-controller
      sync:
        # Flux watches this Git source and reconciles only the apps tree.
        # https://fluxcd.io/flux/components/source/gitrepositories/
        kind: GitRepository
        url: https://github.com/4JX/home-ops.git
        ref: refs/heads/main
        path: ./kubernetes/apps
        interval: 1h
      commonMetadata:
        labels:
          app.kubernetes.io/name: flux
      kustomize:
        # Tune controller behavior for the small, dependency-heavy bootstrap.
        # Controller configuration: https://fluxoperator.dev/docs/instance/controllers/
        patches:
          # Keep independent reconciliations moving while dependencies settle.
          - patch: |-
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --concurrent=10
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --requeue-dependency=5s
            target:
              kind: Deployment
              name: (kustomize-controller|helm-controller|source-controller)
          # Leave rendering headroom for Helm and Kustomize output.
          - patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: all
              spec:
                template:
                  spec:
                    containers:
                      - name: manager
                        resources:
                          limits:
                            memory: 1Gi
            target:
              kind: Deployment
              name: (kustomize-controller|helm-controller|source-controller)
          # Treat pinned chart tags as stable instead of tracking digest moves.
          - patch: |-
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --feature-gates=DisableChartDigestTracking=true
            target:
              kind: Deployment
              name: helm-controller
          # Cancel health checks made obsolete by a newer Git revision.
          - patch: |-
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --feature-gates=CancelHealthCheckOnNewRevision=true
            target:
              kind: Deployment
              name: kustomize-controller
