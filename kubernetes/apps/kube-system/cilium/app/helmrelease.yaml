# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  # Resolve the chart from the separately reconciled, pinned OCIRepository.
  # https://fluxcd.io/flux/components/helm/helmreleases/
  chartRef:
    kind: OCIRepository
    name: cilium
  install:
    # Cilium owns the CRDs needed by its post-install configuration.
    crds: CreateReplace
  interval: 30m
  upgrade:
    # Keep those CRDs compatible with deliberate chart upgrades.
    crds: CreateReplace
  values:
    # Chart values: https://docs.cilium.io/en/stable/helm-values/
    # Use direct node routes instead of an overlay network.
    # https://docs.cilium.io/en/stable/network/concepts/routing/
    autoDirectNodeRoutes: true
    cgroup:
      # NixOS already mounts cgroup v2 on the host.
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    envoy:
      # Envoy Gateway manages the HTTP data plane separately.
      enabled: false
    hubble:
      # Hubble is not part of the initial cluster surface.
      enabled: false
    ipam:
      # Use the Kubernetes node PodCIDRs allocated by k3s.
      mode: kubernetes
    # nix/k3s.nix reads this as K3s' --cluster-cidr.
    # https://docs.cilium.io/en/stable/network/concepts/routing/
    ipv4NativeRoutingCIDR: 10.42.0.0/16
    # The single node exposes the local k3s API to Cilium agents.
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 6443
    # Replace k3s' kube-proxy.
    # https://docs.cilium.io/en/stable/network/kubernetes/kubeproxy-free/
    kubeProxyReplacement: true
    l2announcements:
      # Advertise LoadBalancer IPs on the LAN with ARP.
      # https://docs.cilium.io/en/stable/network/l2-announcements/
      enabled: true
    operator:
      # One replica is sufficient for the single-node cluster.
      replicas: 1
    # Route pod traffic natively; do not encapsulate it.
    # https://docs.cilium.io/en/stable/network/concepts/routing/
    routingMode: native
    socketLB:
      # Keep socket load-balancing limited to the host namespace.
      hostNamespaceOnly: true
