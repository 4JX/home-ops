# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cilium
spec:
  # Poll the registry independently of Git for the pinned chart artifact.
  interval: 15m
  # Extract the Helm content layer from the OCI artifact for helm-controller.
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    # Pin upgrades explicitly so network changes never arrive implicitly.
    tag: 1.19.5
    digest: sha256:557ea3b67b2380bdf91f3006ecea924e10e2963dbaf6085887652311e581460b
  url: oci://quay.io/cilium/charts/cilium
