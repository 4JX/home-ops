# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliuml2announcementpolicy_v2alpha1.json
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: lan
spec:
  # Announce assigned LoadBalancer addresses, but not Service externalIPs.
  # With no selectors or interface regexes, all eligible services and devices
  # participate; this can be narrowed when the final host interface is known.
  loadBalancerIPs: true
