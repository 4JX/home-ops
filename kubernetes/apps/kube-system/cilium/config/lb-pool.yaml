# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumloadbalancerippool_v2.json
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: lan-pool
spec:
  blocks:
    # A one-address pool is enough for the shared Envoy Gateway. .120 sits on
    # the LAN subnet but outside the router's DHCP range (.128 through .254).
    - start: 192.168.1.120
      stop: 192.168.1.120
